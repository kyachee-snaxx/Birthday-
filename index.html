<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belated Happy Birthday Maryam Dania! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            max-width: 480px;
            width: 100%;
            position: relative;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Gift Animation */
        .gift-box {
            font-size: 6rem;
            cursor: pointer;
            transition: transform 0.3s;
            animation: bounce 1s infinite alternate;
        }
        .gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* Main Profile Image Style */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4757;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        /* Sub Image Display */
        .sub-img-container {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin-top: 15px;
            display: none;
        }
        .sub-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 3px solid #1e90ff;
        }

        h1 {
            color: #ff4757;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .apology-text {
            color: #555;
            font-size: 1rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 15px;
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        /* Button Grid */
        .btn-group {
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover { background: #ff6b81; }

        .sub-btn {
            background: #1e90ff;
        }
        .sub-btn:hover { background: #70a1ff; }

        /* Prank Section */
        .question-box {
            margin-top: 20px;
            border-top: 2px dashed #ccc;
            padding-top: 15px;
            width: 100%;
        }

        /* Container keeping buttons on a clean plane */
        .prank-btn-container {
            margin-top: 15px;
            position: relative;
            height: 90px;
            width: 100%;
        }

        /* Absolute positions for precise dodging */
        #yesBtn {
            position: absolute;
            background: #ff4757;
            z-index: 100;
            touch-action: none;
        }

        #noBtn {
            position: absolute;
            background: #2ed573;
            top: 15px;
            left: 60%;
        }

        .hint-text {
            font-size: 0.85rem;
            color: #777;
            margin-top: 10px;
            font-style: italic;
        }

        .hidden { display: none; }

        /* Confetti Styles */
        .confetti {
            position: fixed;
            width: 8px; height: 8px;
            background-color: #f00;
            opacity: 0.7;
            border-radius: 50%;
            animation: fall 3s linear infinite;
            top: -10px;
            z-index: 999;
            pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* The monkey emoji layout style */
        .static-emoji {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 50;
            animation: popIn 0.2s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="stage1" class="card">
        <div class="gift-box" onclick="openGift()">🎁</div>
        <p style="margin-top:15px; color:#555; font-weight:bold;">A surprise is waiting for mariyam ! Tap to open ✨</p>
    </div>

    <div id="stage2" class="card hidden">
        <img class="profile-img" src="mariyam.jpg" alt="Asiya Bathool">
        
        <h1> Happy Birthday mariyaaaaaa! ❤️</h1>
        
        <p class="apology-text">
            "I'm really sorry I missed your special day! I wasn't around here at that time. Hope you had a wonderful birthday bash! we both are in hostel 🎂🎉"
        </p>
        
        <div class="btn-group">
            <button class="btn sub-btn" onclick="showSubImg('mariyam1.jpg')">Another Img 1 📸</button>
            <button class="btn sub-btn" onclick="showSubImg('mariyam2.jpg')">Another Img 2 🖼️</button>
            <button class="btn sub-btn" onclick="showSubImg('mariyam3.jpg')">Another Img 3 🖼️</button>
            <button class="btn sub-btn" onclick="showSubImg('mariyam4.jpeg')">Another Img 4 🖼️</button>
        </div>

        <div id="subImgBox" class="sub-img-container">
            <img id="subImg" class="sub-img" src="" alt="Sub Image">
        </div>

        <div class="question-box" id="qBox">
            <h3 id="questionTitle">Do you hate me? 🥺</h3>
            <div class="prank-btn-container" id="prankContainer">
                
                <button id="noBtn" class="btn" onclick="clickedNo()">No</button>
            </div>
            <p class="hint-text">click yes if you can 😉</p>
        </div>
    </div>

    <script>
        function openGift() {
            document.getElementById('stage1').classList.add('hidden');
            document.getElementById('stage2').classList.remove('hidden');
            setInterval(createConfetti, 150);
        }

        function showSubImg(imgSrc) {
            const container = document.getElementById('subImgBox');
            const img = document.getElementById('subImg');
            img.src = imgSrc;
            container.style.display = 'block';
        }

        // Expanded list of dynamic positions to avoid quick repetition
        const positions = [
            { left: "15%", top: "15px" },
            { left: "40%", top: "45px" },
            { left: "5%", top: "35px" },
            { left: "35%", top: "10px" },
            { left: "20%", top: "50px" }
        ];
        
        let currentIndex = 0;

        function moveYesLoop(event) {
            // Prevent zooming/accidental clicks on mobile viewports
            if(event) event.preventDefault();

            const btn = document.getElementById('yesBtn');

            // 1. Get current position coordinates before changing them
            const oldLeft = btn.style.left;
            const oldTop = btn.style.top;

            // 2. Drop the emoji at the position they just tried to interact with
            dropSingleEmoji(oldLeft, oldTop);

            // 3. Move to a completely different random/next setup point
            let newIndex = Math.floor(Math.random() * positions.length);
            while (newIndex === currentIndex) {
                newIndex = Math.floor(Math.random() * positions.length);
            }
            currentIndex = newIndex;

            // 4. Reposition the button safely
            btn.style.left = positions[currentIndex].left;
            btn.style.top = positions[currentIndex].top;
        }

        // Clears any previously spawned monkey emojis and creates a fresh one
        function dropSingleEmoji(leftVal, topVal) {
            const container = document.getElementById('prankContainer');
            
            // Remove old ones so the layout stays immaculate
            const oldEmojis = container.querySelectorAll('.static-emoji');
            oldEmojis.forEach(el => el.remove());

            // Build the fresh monkey emoji
            const emoji = document.createElement('span');
            emoji.classList.add('static-emoji');
            emoji.innerText = '🙊';
            
            // Center alignment tweaks over the old position
            emoji.style.left = `calc(${leftVal} + 12px) `;
            emoji.style.top = topVal;
            
            container.appendChild(emoji);
        }

        function clickedNo() {
            const qBox = document.getElementById('qBox');
            qBox.innerHTML = "<h2 style='color:#2ed573; margin-top:20px; animation: popIn 0.3s ease;'>I am very happy now 😁! 🤝❤️</h2>";
        }

        function createConfetti() {
            const colors = ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#ffffff'];
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(confetti);
            setTimeout(() => { confetti.remove(); }, 3000);
        }
    </script>
</body>
</html>
